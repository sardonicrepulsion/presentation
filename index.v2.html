<!doctype html>
<html lang="sk">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Prezentácia SRcore: task management pre AI agentov, workflow, audit, projekty a integrácie." />
  <meta property="og:title" content="SRcore Tasks &amp; AI Agents" />
  <meta property="og:description" content="Task management pre AI agentov s kontrolovaným workflow a auditom." />
  <meta property="og:type" content="website" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='16' fill='%2306b6d4'/%3E%3Cpath d='M24 18l24 14-24 14z' fill='white'/%3E%3C/svg%3E" />
  <title>SRcore Tasks &amp; AI Agents</title>
  <style>
    :root {
      --bg: #101827;
      --panel: rgba(255, 255, 255, 0.10);
      --panel-strong: rgba(255, 255, 255, 0.16);
      --text: #f8fafc;
      --muted: #cbd5e1;
      --accent: #7c3aed;
      --accent-2: #06b6d4;
      --accent-3: #22c55e;
      --shadow: 0 28px 80px rgba(0, 0, 0, 0.35);
      --radius: 30px;
      --slide-width: clamp(280px, calc(100vw - 120px), 1180px);
      --slide-height: min(820px, calc(100vh - 154px));
      --slide-padding-y: clamp(24px, 4vh, 38px);
      --slide-padding-x: clamp(34px, 5vw, 62px);
      --visual-vertical-offset: clamp(48px, 8vh, 76px);
      --phone-aspect: 431 / 937;
      --dur-fast: 160ms;
      --dur-base: 220ms;
      --dur-medium: 280ms;
      --dur-slow: 420ms;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }

    html {
      overflow-x: hidden;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      background:
        radial-gradient(circle at 18% 18%, rgba(124, 58, 237, 0.42), transparent 34%),
        radial-gradient(circle at 82% 22%, rgba(6, 182, 212, 0.34), transparent 30%),
        radial-gradient(circle at 50% 88%, rgba(34, 197, 94, 0.18), transparent 28%),
        linear-gradient(135deg, #0f172a 0%, #111827 52%, #020617 100%);
      overflow: hidden;
    }

    .skip-link {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 20;
      color: var(--text);
      background: #0f172a;
      border: 1px solid rgba(255, 255, 255, 0.22);
      border-radius: 10px;
      padding: 8px 12px;
      transform: translateY(-140%);
      transition: transform var(--dur-fast) ease;
    }

    .skip-link:focus {
      transform: translateY(0);
    }

    .app {
      width: 100%;
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      padding: clamp(16px, 2.2vw, 24px);
      gap: 14px;
      overflow-x: hidden;
    }

    .topbar,
    .bottombar {
      width: var(--slide-width);
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      color: var(--muted);
      user-select: none;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 800;
      letter-spacing: 0.02em;
      color: var(--text);
    }

    .brand-mark {
      width: 38px;
      height: 38px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      color: white;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      box-shadow: 0 14px 32px rgba(6, 182, 212, 0.22);
    }

    .hint {
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .key-button {
      color: var(--text);
      background: rgba(255, 255, 255, 0.11);
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-bottom-color: rgba(255, 255, 255, 0.28);
      padding: 4px 8px;
      border-radius: 8px;
      font-size: 12px;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.15);
      cursor: pointer;
      font: inherit;
      font-size: 12px;
      line-height: 1.2;
      transition: background var(--dur-fast) ease, transform var(--dur-fast) ease, opacity var(--dur-fast) ease;
    }

    .key-button:active { transform: translateY(1px); }
    .key-button:disabled { opacity: 0.42; cursor: not-allowed; }

    .stage {
      width: 100%;
      min-width: 0;
      display: grid;
      place-items: center;
      position: relative;
    }

    .slide {
      width: var(--slide-width);
      max-width: 100%;
      height: var(--slide-height);
      display: grid;
      grid-template-columns: minmax(270px, 0.78fr) minmax(420px, 1.22fr);
      gap: clamp(26px, 5vw, 64px);
      align-items: center;
      padding: var(--slide-padding-y) var(--slide-padding-x);
      border-radius: var(--radius);
      background:
        linear-gradient(145deg, rgba(255, 255, 255, 0.16), rgba(255, 255, 255, 0.07)),
        rgba(15, 23, 42, 0.66);
      border: 1px solid rgba(255, 255, 255, 0.16);
      box-shadow: var(--shadow);
      backdrop-filter: blur(20px);
      overflow: hidden;
      position: relative;
      isolation: isolate;
    }

    .slide > * {
      min-width: 0;
    }

    .slide::before {
      content: "";
      position: absolute;
      inset: -40%;
      background:
        radial-gradient(circle at 12% 30%, rgba(255,255,255,0.16), transparent 18%),
        radial-gradient(circle at 88% 80%, rgba(124, 58, 237, 0.28), transparent 20%);
      transform: rotate(-10deg);
      z-index: -1;
    }

    .visual-card {
      width: auto;
      height: min(760px, calc(var(--slide-height) - var(--visual-vertical-offset)));
      min-height: 0;
      aspect-ratio: var(--phone-aspect);
      justify-self: center;
      align-self: center;
      border-radius: 34px;
      padding: 8px;
      background:
        linear-gradient(180deg, rgba(248, 250, 252, 0.98), rgba(226, 232, 240, 0.94));
      border: 1px solid rgba(226, 232, 240, 0.58);
      box-shadow:
        0 30px 70px rgba(2, 6, 23, 0.32),
        0 0 0 1px rgba(255, 255, 255, 0.28) inset;
      display: grid;
      place-items: center;
      overflow: hidden;
      position: relative;
    }

    .visual-card::after {
      content: "";
      position: absolute;
      inset: 8px;
      border-radius: 26px;
      box-shadow: 0 0 0 1px rgba(15, 23, 42, 0.08) inset;
      pointer-events: none;
    }

    .visual-card img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
      border-radius: 26px;
      background: #f8fafc;
      transition: transform var(--dur-slow) ease;
    }

    .visual-card.is-diagram {
      width: min(100%, 430px);
      height: auto;
      aspect-ratio: 1;
      padding: 0;
      border: none;
      border-radius: 0;
      background: transparent;
      box-shadow: none;
    }

    .visual-card.is-diagram::after {
      display: none;
    }

    .visual-card.is-diagram img {
      height: auto;
      border-radius: 0;
      background: transparent;
      filter: drop-shadow(0 28px 44px rgba(2, 6, 23, 0.28));
    }

    .content {
      min-width: 0;
      width: 100%;
      max-width: 100%;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: #dbeafe;
      background: rgba(255, 255, 255, 0.10);
      border: 1px solid rgba(255, 255, 255, 0.13);
      border-radius: 999px;
      padding: 8px 12px;
      font-weight: 700;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.09em;
      margin-bottom: 18px;
    }

    .eyebrow-dot {
      width: 9px;
      height: 9px;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--accent-2), var(--accent-3));
      box-shadow: 0 0 0 6px rgba(6, 182, 212, 0.12);
    }

    h1 {
      margin: 0;
      font-size: clamp(36px, 5.2vw, 68px);
      line-height: 0.98;
      letter-spacing: -0.06em;
    }

    h1,
    .subtitle,
    .bullets span:last-child,
    .pill {
      overflow-wrap: anywhere;
    }

    .subtitle {
      margin: 22px 0 0;
      color: var(--muted);
      font-size: clamp(18px, 2vw, 24px);
      line-height: 1.55;
      max-width: 680px;
    }

    .bullets {
      list-style: none;
      margin: 30px 0 0;
      padding: 0;
      display: grid;
      gap: 14px;
    }

    .bullets li {
      display: grid;
      grid-template-columns: 34px minmax(0, 1fr);
      gap: 13px;
      align-items: start;
      color: #e2e8f0;
      font-size: clamp(17px, 1.75vw, 22px);
      line-height: 1.42;
    }

    .bullet-icon {
      width: 34px;
      height: 34px;
      border-radius: 12px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, rgba(124, 58, 237, 0.9), rgba(6, 182, 212, 0.9));
      box-shadow: 0 10px 22px rgba(6, 182, 212, 0.18);
      font-size: 16px;
      font-weight: 900;
    }

    .meta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 30px;
    }

    .pill {
      min-width: 0;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border-radius: 999px;
      color: #e0f2fe;
      background: rgba(14, 165, 233, 0.14);
      border: 1px solid rgba(125, 211, 252, 0.22);
      font-weight: 700;
      font-size: 14px;
    }

    .nav-button {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 58px;
      height: 58px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      background: rgba(255, 255, 255, 0.10);
      color: white;
      display: grid;
      place-items: center;
      cursor: pointer;
      box-shadow: 0 18px 34px rgba(0, 0, 0, 0.24);
      backdrop-filter: blur(18px);
      transition: transform var(--dur-fast) ease, background var(--dur-fast) ease, opacity var(--dur-fast) ease;
      z-index: 5;
    }

    .nav-button:active { transform: translateY(-50%) scale(0.96); }
    .nav-button:disabled { opacity: 0.32; cursor: not-allowed; }
    .nav-prev { left: max(18px, calc((100vw - var(--slide-width)) / 2 - 82px)); }
    .nav-next { right: max(18px, calc((100vw - var(--slide-width)) / 2 - 82px)); }

    .progress-wrap {
      flex: 1;
      min-width: 160px;
      height: 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.12);
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.10);
    }

    .progress-bar {
      height: 100%;
      width: 0;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--accent), var(--accent-2), var(--accent-3));
      transition: width var(--dur-medium) ease;
    }

    .dots {
      display: flex;
      gap: 8px;
      justify-content: center;
      align-items: center;
      flex-wrap: wrap;
    }

    .dot {
      width: 11px;
      height: 11px;
      border: none;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.28);
      cursor: pointer;
      transition: width var(--dur-base) ease, background var(--dur-base) ease;
      padding: 0;
    }

    .dot.active {
      width: 34px;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
    }

    .counter {
      min-width: 82px;
      text-align: right;
      font-variant-numeric: tabular-nums;
      font-weight: 800;
      color: var(--text);
    }

    .tools {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .tool-button {
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 999px;
      color: var(--text);
      background: rgba(255, 255, 255, 0.10);
      padding: 9px 12px;
      cursor: pointer;
      font-weight: 800;
    }

    .fade-out { animation: fadeOut 180ms ease forwards; }
    .fade-in { animation: fadeIn 260ms ease forwards; }

    .key-button:focus-visible,
    .nav-button:focus-visible,
    .tool-button:focus-visible,
    .dot:focus-visible,
    .slide:focus-visible,
    h1:focus-visible {
      outline: 2px solid var(--accent-2);
      outline-offset: 3px;
    }

    @media (hover: hover) {
      .key-button:hover { background: rgba(255, 255, 255, 0.18); }
      .nav-button:hover { background: rgba(255, 255, 255, 0.18); }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 1ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
        transition-duration: 1ms !important;
      }

      .fade-out,
      .fade-in {
        animation: none !important;
      }
    }

    @keyframes fadeOut {
      from { opacity: 1; transform: translateY(0) scale(1); }
      to { opacity: 0; transform: translateY(12px) scale(0.99); }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-10px) scale(0.99); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @media (max-width: 980px) {
      :root {
        --slide-width: 100%;
        --slide-height: calc(100vh - 150px);
        --slide-padding-y: 28px;
        --slide-padding-x: 28px;
      }

      body { overflow-y: auto; overflow-x: hidden; }
      .app { padding: 16px; min-height: 100dvh; }
      .topbar, .bottombar { width: 100%; }
      .hint { display: none; }
      .slide {
        height: auto;
        min-height: var(--slide-height);
        grid-template-columns: 1fr;
        gap: 24px;
        padding: 28px;
      }
      .content {
        padding-right: 18px;
      }
      h1 {
        font-size: clamp(24px, 6.6vw, 29px);
        line-height: 1.08;
        letter-spacing: -0.04em;
      }
      .subtitle {
        font-size: clamp(15px, 3.9vw, 17px);
      }
      .bullets li {
        grid-template-columns: 30px minmax(0, 1fr);
        gap: 12px;
        font-size: clamp(15px, 3.8vw, 16px);
      }
      .bullet-icon {
        width: 30px;
        height: 30px;
        border-radius: 10px;
      }
      .visual-card {
        height: min(64vh, 560px);
        max-width: min(100%, 270px);
      }
      .visual-card.is-diagram {
        height: auto;
        max-width: min(100%, 280px);
      }
      .nav-button { width: 48px; height: 48px; top: auto; bottom: 72px; }
      .nav-button:active { transform: scale(0.96); }
      .nav-prev { left: 18px; }
      .nav-next { right: 18px; }
      .dots { display: none; }
      .counter { min-width: auto; }
    }

    @media print {
      body { overflow: visible; background: white; color: black; }
      .topbar, .bottombar, .nav-button { display: none; }
      .app { display: block; padding: 0; }
      .stage { display: block; }
      .slide {
        width: 100vw;
        height: 100vh;
        page-break-after: always;
        border-radius: 0;
        border: none;
        box-shadow: none;
        color: black;
        background: white;
      }
    }
  </style>
</head>
<body>
  <a class="skip-link" href="#slideTitle">Preskočiť na obsah slajdu</a>
  <main class="app">
    <header class="topbar">
      <div class="brand">
        <span class="brand-mark" aria-hidden="true">▶</span>
        <span>Tasks &amp; AI Agents</span>
      </div>
      <div class="hint" aria-label="Nápoveda ovládania">
        <span>Ovládanie:</span>
        <button class="key-button" id="hintPrevBtn" type="button" aria-label="Predchádzajúci slajd">←</button>
        <button class="key-button" id="hintNextBtn" type="button" aria-label="Nasledujúci slajd">→</button>
        <button class="key-button" id="hintHomeBtn" type="button" aria-label="Prejsť na prvý slajd">Home</button>
        <button class="key-button" id="hintEndBtn" type="button" aria-label="Prejsť na posledný slajd">End</button>
      </div>
    </header>

    <section class="stage">
      <button class="nav-button nav-prev" id="prevBtn" type="button" aria-label="Predchádzajúci slajd">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>

      <article class="slide fade-in" id="slide" tabindex="-1" aria-live="polite" aria-atomic="true" aria-labelledby="slideTitle" aria-describedby="slideSubtitle">
        <div class="visual-card">
          <img id="slideImage" alt="Ilustrácia k slajdu" loading="eager" />
        </div>
        <div class="content">
          <div class="eyebrow"><span class="eyebrow-dot"></span><span id="slideEyebrow"></span></div>
          <h1 id="slideTitle" tabindex="-1"></h1>
          <p class="subtitle" id="slideSubtitle"></p>
          <ul class="bullets" id="slideBullets"></ul>
          <div class="meta-row" id="slideLabels"></div>
        </div>
      </article>

      <button class="nav-button nav-next" id="nextBtn" type="button" aria-label="Nasledujúci slajd">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M9 18l6-6-6-6" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </section>

    <footer class="bottombar">
      <div class="progress-wrap" aria-hidden="true"><div class="progress-bar" id="progressBar"></div></div>
      <nav class="dots" id="dots" aria-label="Výber slajdu"></nav>
      <div class="tools">
        <button class="tool-button" id="fullscreenBtn" type="button" title="Režim celej obrazovky">⛶</button>
        <div class="counter" id="counter" aria-label="Pozícia slajdu"></div>
      </div>
    </footer>
  </main>

      {

      {

      {

        image: "./screens/settings.png",
        imageAlt: "Nastavenia aplikácie"
      },
      {
        eyebrow: "Integrácie",
        title: "Automatizácia bez ručných prepisov",
        subtitle: "Integrácie dopĺňajú task workflow o automatické linkovanie, notifikácie a pravidelné úlohy.",
        bullets: ["GitHub webhook auto-linkuje PR number a branch name podľa commit messages alebo PR title/body", "Outbound webhook dispatcher posiela task.done event na admin-konfigurované URL", "Cron workery riešia recurring tasks a Telegram alerty pre stale tasky"],
        labels: ["GitHub", "webhooks", "cron"],
        image: "./screens/more.png",
        imageAlt: "More obrazovka s prístupom k administrácii"
      },
      {
        eyebrow: "Záver",
        title: "Ďakujem za pozornosť",
        subtitle: "Priestor na otázky k task workflow, AI agentom a prevádzke SRcore.",
        bullets: [],
        labels: ["Q&A", "SRcore", "AI agents"],
        image: svgClosing("Ďakujem za pozornosť", "#7c3aed", "#06b6d4"),
        imageAlt: "Jednoduchý záverečný symbol",
        visual: "diagram"
      }
    ];

    const state = { index: 0, isAnimating: false, shouldFocusAfterNavigation: false };
    const slideEl = document.getElementById("slide");
    const visualCard = document.querySelector(".visual-card");
    const slideImage = document.getElementById("slideImage");
    const slideEyebrow = document.getElementById("slideEyebrow");
    const slideTitle = document.getElementById("slideTitle");
    const slideSubtitle = document.getElementById("slideSubtitle");
    const slideBullets = document.getElementById("slideBullets");
    const slideLabels = document.getElementById("slideLabels");
    const dotsEl = document.getElementById("dots");
    const progressBar = document.getElementById("progressBar");
    const counter = document.getElementById("counter");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");
    const hintPrevBtn = document.getElementById("hintPrevBtn");
    const hintNextBtn = document.getElementById("hintNextBtn");
    const hintHomeBtn = document.getElementById("hintHomeBtn");
    const hintEndBtn = document.getElementById("hintEndBtn");
    const fullscreenBtn = document.getElementById("fullscreenBtn");
    const prefersReducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)");
    let lastInteractionWasKeyboard = false;
    let touchStartX = 0;
    let touchStartY = 0;

    function renderDots() {
      dotsEl.innerHTML = "";
      slides.forEach((_, index) => {
        const dot = document.createElement("button");
        dot.className = "dot";
        dot.type = "button";
        dot.setAttribute("aria-label", `Prejsť na slajd ${index + 1}`);
        dot.addEventListener("click", () => goToSlide(index));
        dotsEl.appendChild(dot);
      });
    }

    function renderSlide(animate = true) {
      const slide = slides[state.index];
      const fillContent = () => {
        visualCard.classList.toggle("is-diagram", slide.visual === "diagram");
        setSlideImage(slide);
        slideImage.alt = slide.imageAlt || `Ukážka: ${slide.title}`;
        slideEyebrow.textContent = slide.eyebrow;
        slideTitle.textContent = slide.title;
        slideSubtitle.textContent = slide.subtitle;

        slideBullets.innerHTML = "";
        slide.bullets.forEach((item) => {
          const li = document.createElement("li");
          li.innerHTML = `<span class="bullet-icon">✓</span><span>${escapeHtml(item)}</span>`;
          slideBullets.appendChild(li);
        });

        slideLabels.innerHTML = "";
        slide.labels.forEach((label) => {
          const pill = document.createElement("span");
          pill.className = "pill";
          pill.textContent = label;
          slideLabels.appendChild(pill);
        });

        const percent = ((state.index + 1) / slides.length) * 100;
        progressBar.style.width = `${percent}%`;
        counter.textContent = `${state.index + 1} / ${slides.length}`;
        prevBtn.disabled = state.index === 0;
        nextBtn.disabled = state.index === slides.length - 1;
        hintPrevBtn.disabled = state.index === 0;
        hintNextBtn.disabled = state.index === slides.length - 1;
        hintHomeBtn.disabled = state.index === 0;
        hintEndBtn.disabled = state.index === slides.length - 1;

        [...dotsEl.children].forEach((dot, index) => {
          dot.classList.toggle("active", index === state.index);
          dot.setAttribute("aria-current", index === state.index ? "step" : "false");
        });
      };

      if (!animate || prefersReducedMotion.matches) {
        const shouldFocus = state.isAnimating;
        slideEl.classList.remove("fade-out", "fade-in");
        fillContent();
        if (shouldFocus) finishNavigation();
        else state.isAnimating = false;
        return;
      }

      slideEl.classList.remove("fade-in");
      slideEl.classList.add("fade-out");
      window.setTimeout(() => {
        fillContent();
        slideEl.classList.remove("fade-out");
        slideEl.classList.add("fade-in");
        finishWhenFadeInEnds();
      }, 180);
    }

    function goToSlide(index) {
      const nextIndex = Math.max(0, Math.min(index, slides.length - 1));
      if (nextIndex === state.index || state.isAnimating) return;
      state.index = nextIndex;
      state.isAnimating = true;
      state.shouldFocusAfterNavigation = lastInteractionWasKeyboard;
      renderSlide(true);
    }

    function nextSlide() { goToSlide(state.index + 1); }
    function prevSlide() { goToSlide(state.index - 1); }

    function finishWhenFadeInEnds() {
      const fallback = window.setTimeout(finishNavigation, 380);
      slideEl.addEventListener("animationend", (event) => {
        if (event.target !== slideEl || event.animationName !== "fadeIn") return;
        window.clearTimeout(fallback);
        finishNavigation();
      }, { once: true });
    }

    function finishNavigation() {
      state.isAnimating = false;
      if (state.shouldFocusAfterNavigation) {
        slideTitle.focus({ preventScroll: true });
      }
      state.shouldFocusAfterNavigation = false;
    }

    function setSlideImage(slide) {
      slideImage.onerror = () => {
        slideImage.onerror = null;
        slideImage.alt = `Chýba obrázok: ${slide.imageAlt || slide.title}`;
        slideImage.src = toSvgDataUri(missingImageSvg(slide.title));
      };
      slideImage.src = resolveImageSource(slide.image);
    }

    function resolveImageSource(image) {
      const value = String(image || "").trim();
      if (value.startsWith("<svg")) return toSvgDataUri(value);
      return value;
    }

    function toSvgDataUri(svg) {
      return "data:image/svg+xml;charset=UTF-8," + encodeURIComponent(svg);
    }

    function missingImageSvg(title) {
      return `
        <svg xmlns="http://www.w3.org/2000/svg" width="431" height="937" viewBox="0 0 431 937" role="img" aria-label="Chýba obrázok">
          <rect width="431" height="937" fill="#f8fafc"/>
          <rect x="34" y="356" width="363" height="178" rx="28" fill="#e2e8f0"/>
          <path d="M175 438l36 36 58-74" fill="none" stroke="#64748b" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
          <text x="215" y="572" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" font-weight="700" fill="#334155">${escapeHtml(title)}</text>
        </svg>`;
    }

    function escapeHtml(text) {
      return String(text)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function preloadSlideImages() {
      slides.forEach((slide) => {
        const source = resolveImageSource(slide.image);
        if (!source || source.startsWith("data:")) return;
        const image = new Image();
        image.src = source;
      });
    }

    function shouldIgnoreKeyNavigation(event) {
      const target = event.target;
      if (!target) return false;
      const tagName = target.tagName;
      if (target.isContentEditable || ["INPUT", "TEXTAREA", "SELECT"].includes(tagName)) return true;
      return event.key === " " && tagName === "BUTTON";
    }

    prevBtn.addEventListener("click", prevSlide);
    nextBtn.addEventListener("click", nextSlide);
    hintPrevBtn.addEventListener("click", prevSlide);
    hintNextBtn.addEventListener("click", nextSlide);
    hintHomeBtn.addEventListener("click", () => goToSlide(0));
    hintEndBtn.addEventListener("click", () => goToSlide(slides.length - 1));

    document.addEventListener("keydown", () => {
      lastInteractionWasKeyboard = true;
    }, { capture: true });

    document.addEventListener("pointerdown", () => {
      lastInteractionWasKeyboard = false;
    }, { capture: true });

    document.addEventListener("keydown", (event) => {
      if (shouldIgnoreKeyNavigation(event)) return;
      if (["ArrowRight", "PageDown", " "].includes(event.key)) {
        event.preventDefault();
        nextSlide();
      }
      if (["ArrowLeft", "PageUp"].includes(event.key)) {
        event.preventDefault();
        prevSlide();
      }
      if (event.key === "Home") {
        event.preventDefault();
        goToSlide(0);
      }
      if (event.key === "End") {
        event.preventDefault();
        goToSlide(slides.length - 1);
      }
    });

    slideEl.addEventListener("touchstart", (event) => {
      if (event.changedTouches.length !== 1) return;
      lastInteractionWasKeyboard = false;
      touchStartX = event.changedTouches[0].clientX;
      touchStartY = event.changedTouches[0].clientY;
    }, { passive: true });

    slideEl.addEventListener("touchend", (event) => {
      if (event.changedTouches.length !== 1) return;
      const touch = event.changedTouches[0];
      const deltaX = touch.clientX - touchStartX;
      const deltaY = touch.clientY - touchStartY;
      if (Math.abs(deltaX) < 58 || Math.abs(deltaX) < Math.abs(deltaY) * 1.4) return;
      if (deltaX < 0) nextSlide();
      else prevSlide();
    }, { passive: true });

    fullscreenBtn.addEventListener("click", async () => {
      try {
        if (!document.fullscreenElement) {
          await document.documentElement.requestFullscreen();
        } else {
          await document.exitFullscreen();
        }
      } catch (error) {
        console.warn("Fullscreen nie je dostupný:", error);
      }
    });

              <stop stop-color="${c1}"/>

            </linearGradient>
            <filter id="agentShadow" x="-20%" y="-20%" width="140%" height="140%">
              <feDropShadow dx="0" dy="28" stdDeviation="30" flood-color="#020617" flood-opacity="0.34"/>

            <path d="M546 151l26 26-26 26" fill="none" stroke="#ffffff" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" opacity="0.82"/>
          </g>

          <path d="M380 246v56" stroke="#93c5fd" stroke-width="16" stroke-linecap="round" opacity="0.78"/>
          <path d="M380 302l-20-20M380 302l20-20" stroke="#93c5fd" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" opacity="0.78"/>

          <g filter="url(#agentShadow)">
            <rect x="104" y="318" width="174" height="138" rx="30" fill="#ffffff" opacity="0.92"/>
            <circle cx="156" cy="372" r="22" fill="${c1}" opacity="0.86"/>
            <rect x="194" y="354" width="48" height="14" rx="7" fill="#0f172a" opacity="0.62"/>
            <rect x="132" y="416" width="116" height="14" rx="7" fill="#0f172a" opacity="0.28"/>
          </g>

          <g filter="url(#agentShadow)">
            <rect x="293" y="318" width="174" height="138" rx="30" fill="#ffffff" opacity="0.92"/>
            <path d="M344 374l22 22 50-56" fill="none" stroke="${c2}" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
            <rect x="322" y="416" width="116" height="14" rx="7" fill="#0f172a" opacity="0.28"/>
          </g>

          <g filter="url(#agentShadow)">
            <rect x="482" y="318" width="174" height="138" rx="30" fill="#ffffff" opacity="0.92"/>

            <circle cx="522" cy="344" r="8" fill="#0f172a" opacity="0.54"/>
            <circle cx="522" cy="382" r="8" fill="#0f172a" opacity="0.54"/>
            <circle cx="522" cy="420" r="8" fill="#0f172a" opacity="0.54"/>
          </g>

          <path d="M278 388h15M467 388h15" stroke="#93c5fd" stroke-width="14" stroke-linecap="round" opacity="0.82"/>

          <g filter="url(#agentShadow)">
            <rect x="190" y="548" width="380" height="96" rx="30" fill="#ffffff" opacity="0.92"/>
            <rect x="232" y="580" width="150" height="16" rx="8" fill="#0f172a" opacity="0.48"/>
            <rect x="232" y="612" width="250" height="14" rx="7" fill="#0f172a" opacity="0.24"/>
            <path d="M517 574l20 20-20 20" fill="none" stroke="${c2}" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
          </g>

          <path d="M380 456v68" stroke="#93c5fd" stroke-width="16" stroke-linecap="round" opacity="0.78"/>
          <path d="M380 524l-20-20M380 524l20-20" stroke="#93c5fd" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" opacity="0.78"/>
        </svg>`;
    }

    function svgClosing(title, c1, c2) {
      return `
        <svg xmlns="http://www.w3.org/2000/svg" width="760" height="760" viewBox="0 0 760 760" role="img" aria-label="${title}">
          <defs>
            <linearGradient id="closingGradient" x1="150" y1="124" x2="610" y2="636" gradientUnits="userSpaceOnUse">
              <stop stop-color="${c1}"/>
              <stop offset="1" stop-color="${c2}"/>
            </linearGradient>
            <filter id="closingShadow" x="-20%" y="-20%" width="140%" height="140%">
              <feDropShadow dx="0" dy="28" stdDeviation="30" flood-color="#020617" flood-opacity="0.32"/>
            </filter>
          </defs>
          <rect x="72" y="84" width="616" height="592" rx="58" fill="#0f172a" opacity="0.28"/>
          <circle cx="380" cy="330" r="182" fill="url(#closingGradient)" filter="url(#closingShadow)"/>
          <circle cx="380" cy="330" r="124" fill="#ffffff" opacity="0.16"/>
          <path d="M296 328l55 55 118-132" fill="none" stroke="#ffffff" stroke-width="34" stroke-linecap="round" stroke-linejoin="round"/>
          <rect x="214" y="548" width="332" height="28" rx="14" fill="#ffffff" opacity="0.40"/>
          <rect x="278" y="600" width="204" height="22" rx="11" fill="#ffffff" opacity="0.24"/>
        </svg>`;
    }

    preloadSlideImages();
    renderDots();
    renderSlide(false);
  </script>
