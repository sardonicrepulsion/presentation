<!doctype html>
<html lang="sk">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0b1020">
  <meta name="description" content="Slide deck viewer — image-left + bullets-right layout, keyboard + touch nav.">
  <title>Presentation</title>
  <link rel="icon" type="image/svg+xml" href="/assets/icons/icon-192.svg">
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="stylesheet" href="/css/app.css">
  <script src="/js/app.js" defer></script>
</head>
<body>
  <a class="skip-link" href="#main">Skip to main</a>

  <div id="progress" class="progress" role="progressbar" aria-label="Slide progress" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
    <div class="progress-bar" id="progress-bar"></div>
  </div>

  <main id="main" class="deck" tabindex="-1">
    <section id="slide" class="slide" aria-live="polite">
      <div class="slide-image" id="slide-image" aria-hidden="true"></div>
      <div class="slide-body">
        <h1 class="slide-title" id="slide-title">Loading…</h1>
        <ul class="slide-bullets" id="slide-bullets"></ul>
      </div>
    </section>
  </main>

  <nav class="controls" aria-label="Slide controls">
    <button type="button" class="control" id="prev" aria-label="Previous slide" data-action="prev">‹</button>
    <span class="counter" id="counter" aria-live="polite">–</span>
    <button type="button" class="control" id="next" aria-label="Next slide" data-action="next">›</button>
    <button type="button" class="control control-fs" id="fullscreen" aria-label="Toggle fullscreen" data-action="fullscreen">⛶</button>
  </nav>

  <div class="hint" id="hint" role="note">← / → · Home / End · F fullscreen · Esc exit</div>
</body>
</html>
