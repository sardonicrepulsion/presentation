<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-label="Orchestrator pattern: Claude as manager, subagents implement">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#141b2f"/>
    </linearGradient>
    <marker id="arr3" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#41d7ff"/>
    </marker>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>
  <g font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" fill="#edf2ff">
    <rect x="320" y="60" width="160" height="60" rx="10" fill="#1a2547" stroke="#41d7ff" stroke-width="2"/>
    <text x="400" y="85" text-anchor="middle" font-weight="700">Manager Claude</text>
    <text x="400" y="105" text-anchor="middle" font-size="11" fill="#9aa8c7">triage · delegate · monitor</text>

    <g stroke="#8ee66f" stroke-width="1.5" fill="#1a2547">
      <rect x="60" y="200" width="160" height="60" rx="8"/>
      <rect x="320" y="200" width="160" height="60" rx="8"/>
      <rect x="580" y="200" width="160" height="60" rx="8"/>
    </g>
    <text x="140" y="225" text-anchor="middle" font-weight="700" fill="#8ee66f">Subagent A</text>
    <text x="140" y="245" text-anchor="middle" font-size="11" fill="#9aa8c7">Sonnet 4.6 · easy/medium</text>
    <text x="400" y="225" text-anchor="middle" font-weight="700" fill="#8ee66f">Subagent B</text>
    <text x="400" y="245" text-anchor="middle" font-size="11" fill="#9aa8c7">Opus 4.7 · hard</text>
    <text x="660" y="225" text-anchor="middle" font-weight="700" fill="#8ee66f">Subagent C</text>
    <text x="660" y="245" text-anchor="middle" font-size="11" fill="#9aa8c7">Sonnet 4.6 · easy/medium</text>

    <g stroke="#ffae5e" stroke-width="1.5" fill="#1a2547" stroke-dasharray="3 3">
      <rect x="120" y="350" width="160" height="50" rx="8"/>
      <rect x="320" y="350" width="160" height="50" rx="8"/>
      <rect x="520" y="350" width="160" height="50" rx="8"/>
    </g>
    <text x="200" y="372" text-anchor="middle" font-size="12" fill="#ffae5e">Reviewer (Opus)</text>
    <text x="200" y="389" text-anchor="middle" font-size="11" fill="#9aa8c7">distinct from processing</text>
    <text x="400" y="372" text-anchor="middle" font-size="12" fill="#ffae5e">Reviewer (Sonnet)</text>
    <text x="400" y="389" text-anchor="middle" font-size="11" fill="#9aa8c7">distinct from processing</text>
    <text x="600" y="372" text-anchor="middle" font-size="12" fill="#ffae5e">Tester (Haiku)</text>
    <text x="600" y="389" text-anchor="middle" font-size="11" fill="#9aa8c7">CI gate + smoke</text>

    <g stroke="#41d7ff" stroke-width="1.5" fill="none" marker-end="url(#arr3)">
      <line x1="380" y1="120" x2="160" y2="198"/>
      <line x1="400" y1="120" x2="400" y2="198"/>
      <line x1="420" y1="120" x2="640" y2="198"/>
      <line x1="140" y1="260" x2="180" y2="348"/>
      <line x1="400" y1="260" x2="400" y2="348"/>
      <line x1="660" y1="260" x2="600" y2="348"/>
    </g>
