<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-label="Three fragmented systems before SRcore">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#141b2f"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>
  <g font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" fill="#edf2ff">
    <text x="400" y="60" text-anchor="middle" font-size="18" font-weight="700">Pred SRcore</text>
    <text x="400" y="82" text-anchor="middle" font-size="12" fill="#9aa8c7">tri systémy úloh, žiadny sa nezhoduje</text>

    <g>
      <rect x="60" y="140" width="200" height="240" rx="12" fill="#1a2547" stroke="#ff6b6b" stroke-width="2"/>
      <text x="160" y="175" text-anchor="middle" font-weight="700" fill="#ff6b6b">Spreadsheet</text>
      <line x1="80" y1="200" x2="240" y2="200" stroke="#7a4242" stroke-width="1" stroke-dasharray="3 3"/>
      <text x="80" y="230" font-size="12" fill="#9aa8c7">— manuálne updaty</text>
      <text x="80" y="252" font-size="12" fill="#9aa8c7">— bez histórie</text>
      <text x="80" y="274" font-size="12" fill="#9aa8c7">— dva ľudia, dve verzie</text>
      <text x="80" y="320" font-size="14" fill="#ff6b6b" font-weight="700" transform="rotate(-3 80 320)">×</text>
      <text x="100" y="320" font-size="13" fill="#ff6b6b">stale za 1 deň</text>
    </g>

    <g>
      <rect x="300" y="140" width="200" height="240" rx="12" fill="#1a2547" stroke="#ff6b6b" stroke-width="2"/>
      <text x="400" y="175" text-anchor="middle" font-weight="700" fill="#ff6b6b">GitHub Issues</text>
      <line x1="320" y1="200" x2="480" y2="200" stroke="#7a4242" stroke-width="1" stroke-dasharray="3 3"/>
      <text x="320" y="230" font-size="12" fill="#9aa8c7">— per-repo silá</text>
      <text x="320" y="252" font-size="12" fill="#9aa8c7">— žiadny kanban view</text>
      <text x="320" y="274" font-size="12" fill="#9aa8c7">— labely vs. polia chaos</text>
      <text x="320" y="320" font-size="14" fill="#ff6b6b" font-weight="700">×</text>
      <text x="340" y="320" font-size="13" fill="#ff6b6b">žiadny global view</text>
    </g>

    <g>
      <rect x="540" y="140" width="200" height="240" rx="12" fill="#1a2547" stroke="#ff6b6b" stroke-width="2"/>
      <text x="640" y="175" text-anchor="middle" font-weight="700" fill="#ff6b6b">app DB (legacy)</text>
      <line x1="560" y1="200" x2="720" y2="200" stroke="#7a4242" stroke-width="1" stroke-dasharray="3 3"/>
      <text x="560" y="230" font-size="12" fill="#9aa8c7">— vlastná schéma</text>
      <text x="560" y="252" font-size="12" fill="#9aa8c7">— "done" = checkbox</text>
      <text x="560" y="274" font-size="12" fill="#9aa8c7">— bez auditu</text>
      <text x="560" y="320" font-size="14" fill="#ff6b6b" font-weight="700">×</text>
      <text x="580" y="320" font-size="13" fill="#ff6b6b">self-report = trust</text>
    </g>

    <text x="400" y="430" text-anchor="middle" font-size="14" fill="#edf2ff" font-weight="700">AI agenti? Šliapali si po sebe — žiadna zdieľaná fronta.</text>
    <text x="400" y="455" text-anchor="middle" font-size="12" fill="#9aa8c7">Kvalita projektov klesala (rating 5–6/10), žiadny baseline.</text>
  </g>
</svg>
