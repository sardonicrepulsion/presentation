<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-label="Task lifecycle state machine">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#141b2f"/>
    </linearGradient>
    <marker id="arr2" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#41d7ff"/>
    </marker>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>
  <g font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" fill="#edf2ff">
    <g stroke="#41d7ff" stroke-width="2" fill="none">
      <rect x="40" y="200" width="100" height="50" rx="25"/>
      <rect x="170" y="200" width="100" height="50" rx="25"/>
      <rect x="300" y="200" width="120" height="50" rx="25"/>
      <rect x="450" y="200" width="120" height="50" rx="25"/>
      <rect x="600" y="200" width="100" height="50" rx="25"/>
    </g>
    <g stroke="#8ee66f" stroke-width="2" fill="none">
      <rect x="600" y="120" width="100" height="40" rx="20"/>
    </g>
    <g stroke="#ffae5e" stroke-width="2" fill="none">
      <rect x="280" y="350" width="100" height="40" rx="20" stroke-dasharray="4 3"/>
      <rect x="420" y="350" width="100" height="40" rx="20" stroke-dasharray="4 3"/>
    </g>
    <text x="90" y="230" text-anchor="middle">new</text>
    <text x="220" y="230" text-anchor="middle">ready</text>
    <text x="360" y="230" text-anchor="middle">in-progress</text>
    <text x="510" y="230" text-anchor="middle">in-review</text>
    <text x="650" y="230" text-anchor="middle">testing</text>
    <text x="650" y="145" text-anchor="middle" fill="#8ee66f" font-weight="700">done</text>
    <text x="330" y="375" text-anchor="middle" fill="#ffae5e">on-hold</text>
    <text x="470" y="375" text-anchor="middle" fill="#ffae5e">canceled</text>
    <g stroke="#41d7ff" stroke-width="1.5" fill="none" marker-end="url(#arr2)">
      <line x1="140" y1="225" x2="168" y2="225"/>
      <line x1="270" y1="225" x2="298" y2="225"/>
      <line x1="420" y1="225" x2="448" y2="225"/>
      <line x1="570" y1="225" x2="598" y2="225"/>
      <path d="M 650 200 L 650 162"/>
    </g>
    <g stroke="#ffae5e" stroke-width="1.2" fill="none" stroke-dasharray="3 3" marker-end="url(#arr2)">
      <path d="M 360 250 Q 340 300 332 348"/>
      <path d="M 510 250 Q 490 300 470 348"/>
    </g>
    <text x="400" y="310" text-anchor="middle" font-size="11" fill="#9aa8c7">stale-watcher · auto-pause &gt;2 h</text>
  </g>
  <text x="400" y="450" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" fill="#9aa8c7">DB-level done-guard: 3 process_runs povinné · review_model ≠ processing_model</text>
</svg>
