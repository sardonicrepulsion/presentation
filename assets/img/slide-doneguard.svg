<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-label="Done-guard trigger blocks fake completion">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#141b2f"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>
  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" fill="#edf2ff">
    <rect x="80" y="60" width="640" height="170" rx="8" fill="#1a2547" stroke="#41d7ff" stroke-width="1.5"/>
    <text x="100" y="90" fill="#9aa8c7" font-size="12">— manual SQL update attempt</text>
    <text x="100" y="115" fill="#41d7ff">UPDATE</text>
    <text x="160" y="115">core_tasks</text>
    <text x="100" y="135"><tspan fill="#41d7ff">SET</tspan> status = <tspan fill="#8ee66f">'done'</tspan></text>
    <text x="100" y="155"><tspan fill="#41d7ff">WHERE</tspan> id = 547;</text>
    <text x="100" y="195" fill="#ff6b6b" font-weight="700">ERROR 1644 (45000):</text>
    <text x="100" y="215" fill="#ff6b6b">done_status_requires_complete_process_metrics</text>
  </g>
  <g transform="translate(580 280) rotate(-12)">
    <rect x="-90" y="-30" width="180" height="60" rx="4" fill="none" stroke="#ff6b6b" stroke-width="4"/>
    <text x="0" y="8" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="34" font-weight="900" fill="#ff6b6b" letter-spacing="2">BLOCKED</text>
  </g>
  <g font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" fill="#edf2ff">
    <text x="80" y="320" font-weight="700" fill="#8ee66f">Trigger requires:</text>
    <text x="100" y="345">✓ 3 process_runs (processing / review / testing)</text>
    <text x="100" y="368">✓ each with model + tokens + time</text>
    <text x="100" y="391">✓ review_model ≠ processing_model</text>
    <text x="100" y="414">✓ blocks even root SQL UPDATE</text>
  </g>
  <text x="400" y="465" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" fill="#9aa8c7">Žiadne fake-done. Žiadne hallucinations. Iba dôkaz.</text>
</svg>
