    <text x="400" y="245" text-anchor="middle" font-size="12" fill="#9aa8c7">core_tasks · core_projects</text>
    <text x="400" y="263" text-anchor="middle" font-size="12" fill="#9aa8c7">core_audit_log</text>
    <text x="400" y="281" text-anchor="middle" font-size="12" fill="#9aa8c7">core_task_process_runs</text>

    <g>
      <rect x="600" y="80" width="160" height="40" rx="20" fill="#1a2547" stroke="#ffae5e" stroke-width="1.5"/>
      <text x="680" y="105" text-anchor="middle">Auto deploys</text>
      <rect x="600" y="140" width="160" height="40" rx="20" fill="#1a2547" stroke="#ffae5e" stroke-width="1.5"/>
      <text x="680" y="165" text-anchor="middle">Audit trail</text>
      <rect x="600" y="200" width="160" height="40" rx="20" fill="#1a2547" stroke="#ffae5e" stroke-width="1.5"/>
      <text x="680" y="225" text-anchor="middle">Dashboards</text>
      <rect x="600" y="260" width="160" height="40" rx="20" fill="#1a2547" stroke="#ffae5e" stroke-width="1.5"/>
      <text x="680" y="285" text-anchor="middle">Outbound webhooks</text>
      <rect x="600" y="320" width="160" height="40" rx="20" fill="#1a2547" stroke="#ffae5e" stroke-width="1.5"/>
      <text x="680" y="345" text-anchor="middle">CI / CD gates</text>
    </g>

    <g stroke="#41d7ff" stroke-width="1.2" fill="none" marker-end="url(#arr4)">
      <line x1="180" y1="100" x2="278" y2="170"/>
      <line x1="180" y1="160" x2="278" y2="200"/>
      <line x1="180" y1="220" x2="278" y2="240"/>
      <line x1="180" y1="280" x2="278" y2="280"/>
      <line x1="180" y1="340" x2="278" y2="320"/>
