<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-label="SRcore funnel: many inputs to one source of truth">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#141b2f"/>
    </linearGradient>
    <marker id="arr4" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#41d7ff"/>
    </marker>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>
  <g font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" fill="#edf2ff">
    <g>
      <rect x="40" y="80" width="140" height="40" rx="20" fill="#1a2547" stroke="#41d7ff" stroke-width="1.5"/>
      <text x="110" y="105" text-anchor="middle">Ľudia</text>
      <rect x="40" y="140" width="140" height="40" rx="20" fill="#1a2547" stroke="#41d7ff" stroke-width="1.5"/>
      <text x="110" y="165" text-anchor="middle">AI agenti</text>
