      <rect x="40" y="260" width="140" height="40" rx="20" fill="#1a2547" stroke="#41d7ff" stroke-width="1.5"/>
      <text x="110" y="285" text-anchor="middle">GitHub webhooks</text>
      <rect x="40" y="320" width="140" height="40" rx="20" fill="#1a2547" stroke="#41d7ff" stroke-width="1.5"/>
      <text x="110" y="345" text-anchor="middle">Cron / events</text>
    </g>

    <polygon points="280,80 520,180 520,320 280,420" fill="#1a2547" stroke="#8ee66f" stroke-width="2"/>
