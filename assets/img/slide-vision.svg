    <g stroke="#ffae5e" stroke-width="1.2" fill="none" marker-end="url(#arr4)">
      <line x1="522" y1="200" x2="598" y2="100"/>
      <line x1="522" y1="220" x2="598" y2="160"/>
      <line x1="522" y1="240" x2="598" y2="220"/>
      <line x1="522" y1="280" x2="598" y2="280"/>
      <line x1="522" y1="300" x2="598" y2="340"/>
