<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-label="Roadmap timeline">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#141b2f"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>
  <g font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" fill="#edf2ff">
    <text x="400" y="80" text-anchor="middle" font-size="20" font-weight="700">Ďalšie kroky</text>

    <line x1="120" y1="240" x2="680" y2="240" stroke="#41d7ff" stroke-width="2"/>

    <g>
      <circle cx="180" cy="240" r="12" fill="#41d7ff"/>
      <text x="180" y="200" text-anchor="middle" font-weight="700" fill="#41d7ff">Q3</text>
      <text x="180" y="285" text-anchor="middle">Cost dashboard</text>
      <text x="180" y="305" text-anchor="middle" font-size="11" fill="#9aa8c7">tokeny / projekt / model</text>
    </g>
    <g>
      <circle cx="350" cy="240" r="12" fill="#8ee66f"/>
      <text x="350" y="200" text-anchor="middle" font-weight="700" fill="#8ee66f">Q4</text>
      <text x="350" y="285" text-anchor="middle">Recurring task templates</text>
      <text x="350" y="305" text-anchor="middle" font-size="11" fill="#9aa8c7">cron-based + parametric</text>
    </g>
    <g>
      <circle cx="520" cy="240" r="12" fill="#ffae5e"/>
      <text x="520" y="200" text-anchor="middle" font-weight="700" fill="#ffae5e">Q1 ’27</text>
      <text x="520" y="285" text-anchor="middle">Public read-only</text>
      <text x="520" y="305" text-anchor="middle" font-size="11" fill="#9aa8c7">project pages bez SSO</text>
    </g>
    <g>
      <circle cx="680" cy="240" r="12" fill="#ff6b6b" stroke="#ff6b6b" stroke-width="2" fill-opacity="0.2"/>
      <text x="680" y="200" text-anchor="middle" font-weight="700" fill="#ff6b6b">?</text>
      <text x="680" y="285" text-anchor="middle">Open-source?</text>
      <text x="680" y="305" text-anchor="middle" font-size="11" fill="#9aa8c7">otázka pre tím</text>
    </g>

    <text x="400" y="400" text-anchor="middle" font-size="22" font-weight="700" fill="#edf2ff">Otázky?</text>
    <text x="400" y="425" text-anchor="middle" font-size="12" fill="#9aa8c7">peter.boda22@gmail.com · github.com/sardonicrepulsion/srcore</text>
  </g>
</svg>
