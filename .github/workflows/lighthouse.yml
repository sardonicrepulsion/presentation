name: Lighthouse

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lighthouse:
    name: Lighthouse CI score gates
    runs-on: [self-hosted, Linux, ARM64, org-pool]
    timeout-minutes: 12
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          load: true
          provenance: false
          sbom: false
          tags: presentation:lhci-${{ github.sha }}
      - name: Boot container
        run: |
          docker rm -f presentation-lhci 2>/dev/null || true
          docker run -d --name presentation-lhci -p 19240:80 presentation:lhci-${{ github.sha }}
          for i in $(seq 1 15); do
            if curl -sSf http://127.0.0.1:19240/healthz >/dev/null 2>&1; then
              echo "Container ready"
              break
            fi
            sleep 2
          done
      - name: Resolve Chromium binary for Lighthouse
        run: |
          CHROME=$(ls -1d /opt/playwright-browsers/chromium-*/chrome-linux/chrome 2>/dev/null | sort -V | tail -1)
          if [ -z "$CHROME" ] || [ ! -x "$CHROME" ]; then
            echo "::error::No Playwright Chromium found under /opt/playwright-browsers/chromium-*/chrome-linux/chrome"
            exit 1
          fi
          echo "CHROME_PATH=$CHROME" >> "$GITHUB_ENV"
          "$CHROME" --version || true
      - name: Run Lighthouse CI
        run: npx --yes @lhci/cli@0.14.x autorun
      - name: Upload Lighthouse report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lighthouse-report
          path: .lighthouseci/
          include-hidden-files: true
          retention-days: 7
      - name: Tear down
        if: always()
        run: docker rm -f presentation-lhci || true
