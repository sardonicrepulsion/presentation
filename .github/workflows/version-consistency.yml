name: Version Consistency

on:
  push:
    branches: [main]
  pull_request:
  workflow_call: {}

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  check:
    runs-on: [self-hosted, Linux, ARM64, org-pool]
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v6
      - name: Gather + compare version literals across all sources
        run: |
          set -eo pipefail
          declare -a found=()
          add() {
            local label="$1" val="$2"
            if [ -n "$val" ]; then
              found+=("$label=$val")
            fi
          }

          if [ -f package.json ]; then
            add "package.json" "$(jq -r '.version // ""' package.json)"
          fi
          if [ -f version.json ]; then
            add "version.json" "$(jq -r '.version // ""' version.json)"
          fi
          if [ -f public/version.json ]; then
            add "public/version.json" "$(jq -r '.version // ""' public/version.json)"
          fi
          if [ -f package-lock.json ]; then
            add "package-lock.json" "$(jq -r '.version // ""' package-lock.json)"
          fi
          if [ -f version.txt ]; then
            add "version.txt" "$(tr -d ' \n' < version.txt)"
          fi
          if [ -f VERSION ]; then
            add "VERSION" "$(tr -d ' \n' < VERSION)"
          fi
          if [ -f Caddyfile ]; then
            # Match both plain `"version":"X"` and escape-quoted `\"version\":\"X\"`
            # (Caddyfile labels in dokku containers double-escape JSON) (SRcore #843).
            v=$(grep -oE '"version":"[^"]+"' Caddyfile 2>/dev/null | head -1 | cut -d'"' -f4 || true)
            if [ -z "$v" ]; then
              v=$(grep -oE '\\"version\\":\\"[^\\]+\\"' Caddyfile 2>/dev/null | head -1 | sed -E 's/.*\\"version\\":\\"([^\\]+)\\".*/\1/' || true)
            fi
            add "Caddyfile" "$v"
          fi

          if [ ${#found[@]} -eq 0 ]; then
            echo "::warning::No version sources found (no package.json / version.json / public/version.json / package-lock.json / version.txt / VERSION / Caddyfile)."
            exit 0
          fi

          echo "Discovered version literals:"
          printf '  %s\n' "${found[@]}"

          uniq=$(printf '%s\n' "${found[@]}" | awk -F= '{print $NF}' | sort -u)
          count=$(printf '%s\n' "$uniq" | grep -c .)
          if [ "$count" -ne 1 ]; then
            echo "::error::version drift detected — sources disagree:"
            printf '  %s\n' "${found[@]}"
            exit 1
          fi
          echo "all sources agree: $uniq"

          echo "--- CHANGELOG.md compliance (srcore#766) ---"
          if [ ! -f CHANGELOG.md ]; then
            echo "::error::CHANGELOG.md missing. V2 standard requires CHANGELOG.md at repo root."
            exit 1
          fi

          header=$(head -1 CHANGELOG.md)
          if ! printf '%s' "$header" | grep -qiE '^# *changelog *$'; then
            echo "::error::CHANGELOG.md first line must be '# Changelog' (found: $header)"
            exit 1
          fi

          top=$(grep -m1 -E '^## \[' CHANGELOG.md || true)
          if [ -z "$top" ]; then
            echo "::error::CHANGELOG.md has no '## [version]' entries."
            exit 1
          fi
          echo "Top entry: $top"

          if ! printf '%s' "$top" | grep -qE '202[0-9]-[0-9]{2}-[0-9]{2}'; then
            echo "::error::Top entry missing ISO date (YYYY-MM-DD): $top"
            exit 1
          fi

          if ! printf '%s' "$top" | grep -qE '(srcore)?#[0-9]+|t-[0-9]+'; then
            echo "::error::Top entry missing task ref (#NNN, srcore#NNN, or t-NNNNN): $top"
            exit 1
          fi

          ver=$(printf '%s' "$top" | grep -oE '\[[0-9]+\.[0-9]+\.[0-9]+[^]]*\]' | head -1 | tr -d '[]')
          if [ -z "$ver" ]; then
            echo "::error::Could not parse version from top entry: $top"
            exit 1
          fi
          echo "Top entry version: $ver"

          if [ "$ver" != "$uniq" ]; then
            echo "::error::CHANGELOG top entry version ($ver) != source-of-truth ($uniq). Add an entry for $uniq before bumping."
            exit 1
          fi
          echo "✓ CHANGELOG.md compliant: header ok, top entry has date+task ref, version matches sources."
