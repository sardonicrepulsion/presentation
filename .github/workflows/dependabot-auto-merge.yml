name: Dependabot Auto-merge

# SRcore #777 — patch-version dependency bumps from Dependabot auto-merge
# once CI is green. Major/minor stay manual.
# Requires repo setting `allow_auto_merge=true` (enabled in this PR).

on: pull_request

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    if: github.actor == 'dependabot[bot]'
    runs-on: [self-hosted, sardonic-arm64-presentation]
    timeout-minutes: 3
    steps:
      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Approve + auto-merge patch updates
        if: steps.meta.outputs.update-type == 'version-update:semver-patch'
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr review --approve "$PR_URL"
          gh pr merge --auto --squash "$PR_URL"
