name: actionlint

on:
  pull_request:
    paths:
      - '.github/workflows/**'
      - '.github/actionlint.yaml'
      - '.github/actionlint.yml'
  push:
    branches: [main]
    paths:
      - '.github/workflows/**'
      - '.github/actionlint.yaml'
      - '.github/actionlint.yml'

permissions:
  contents: read

jobs:
  actionlint:
    name: Lint GitHub Actions workflows
    runs-on: [self-hosted, Linux, ARM64, org-pool]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run actionlint (rhysd/actionlint docker, pinned by digest)
        run: |
          docker run --rm \
            -v "${GITHUB_WORKSPACE}:/repo" \
            -w /repo \
            docker.io/rhysd/actionlint@sha256:b1934ee5f1c509618f2508e6eb47ee0d3520686341fec936f3b79331f9315667 \
            -color \
            -shellcheck= \
            -pyflakes=
